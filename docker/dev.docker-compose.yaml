services:
  dev:
    build:
      context: ..
      dockerfile: ./docker/dev.Dockerfile
      args:
        PASSWORD: ${PASSWORD:-123456}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    ports:
      - ${SSH_HOST:-127.0.0.1}:${SSH_PORT:-22222}:22
    environment:
      "TERM": "xterm-256color"
    volumes:
      - ..:/home/devuser/workdir
